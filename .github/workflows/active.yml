name: Xiv3r Auto Commit

on:
  schedule:
    - cron: "* * * * *"

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Switch to main branch
        run: git checkout main

      - name: Update README with timestamp
        run: |
          # Get current timestamp
          TIMESTAMP=$(date +"%m-%d-%Y %H:%M")
          
          # Check if README.md exists, create if it doesn't
          if [ ! -f "README.md" ]; then
            echo "# Repository README" > README.md
            echo "" >> README.md
          fi
          
          # Add or update timestamp section
          if grep -q "Last Auto Commit Update:" README.md; then
            sed -i "s/Last Auto Commit Update: .*/Last Auto Commit Update: $TIMESTAMP/" README.md
          else
            echo "" >> README.md
            echo "---" >> README.md
            echo "### Auto Commit Status" >> README.md
            echo "Last Auto Commit Update: $TIMESTAMP" >> README.md
            echo "" >> README.md
          fi
          
          echo "README.md updated with timestamp: $TIMESTAMP"

      - name: Loop Commit Updates
        run: |
          set -e
          
          FILES=(".github/FILE_1.md" "README.md" ".github/FILE_2.md" ".github/FILE_3.md" ".github/FILE_4.md")  # List of files to update
          COMMIT_LOOP_COUNT=5  # Reduced for testing, change back to 950 later

          for FILE in "${FILES[@]}"; do
            echo "Checking for file: $FILE"

            # Create directory if it doesn't exist
            DIR=$(dirname "$FILE")
            if [ "$DIR" != "." ]; then
              mkdir -p "$DIR"
            fi

            for ((i=1; i<=COMMIT_LOOP_COUNT; i++)); do
              echo "Iteration $i of $COMMIT_LOOP_COUNT"
              
              # Update timestamp in README on each iteration if it's the README file
              if [ "$FILE" = "README.md" ]; then
                TIMESTAMP=$(date +"%m-%d-%Y %H:%M")
                sed -i "s/Last Update: .*/Last Update: $TIMESTAMP/" "README.md"
                echo "Updated README timestamp to: $TIMESTAMP"
              fi
              
              if [ ! -f "$FILE" ]; then
                echo "File not found, creating $FILE..."
                echo "# Git Auto Commit | Hidden File" > "$FILE"
                echo "This file was added $(date +"%b %d, %Y")" >> "$FILE"
                echo "" >> "$FILE"
                echo "Daily git commit active" >> "$FILE"
                echo "" >> "$FILE"
                echo "commit number: 1" >> "$FILE"
                NEXT_COUNT=1
              else
                echo "File exists. Updating commit number..."
                CURRENT_COUNT=$(grep -oP 'commit number: \K\d+' "$FILE" || echo "0")
                echo "Current commit number: $CURRENT_COUNT"
                NEXT_COUNT=$((CURRENT_COUNT + 1))
                sed -i "s/commit number: .*/commit number: $NEXT_COUNT/" "$FILE"
                echo "Updated commit number to: $NEXT_COUNT"
              fi

              echo "Contents of the file:"
              cat "$FILE"

              echo "Staging changes..."
              git add "$FILE"
              
              echo "Committing changes..."
              git commit -m "Auto commit #$NEXT_COUNT : target - ($FILE)" --allow-empty

            done

            echo "Pulling latest changes to ensure we start with the latest commit..."
            git pull --rebase origin main
            
            echo "Pushing changes..."
            git push origin main
            
            sleep 1
          done

          echo "All commits completed successfully!"
